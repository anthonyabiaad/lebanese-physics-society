<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Lebanese Physics Society — Directory</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="site-header">
    <div class="container header-inner">
      <div class="header-copy">
        <p class="eyebrow">Lebanese Physics Society</p>
        <h1>Members Directory</h1>
        <p class="lead">A network of Lebanese physicists across universities, laboratories, and industry.</p>
        <nav class="site-nav" aria-label="Main navigation">
          <a class="active" href="index.html">Directory</a>
          <a href="news.html">News</a>
          <a href="offers.html">Offers</a>
        </nav>
        <div class="cta-row">
          <a id="whatsappLink" class="cta primary" href="#" target="_blank" rel="noopener">Join the WhatsApp group</a>
          <a id="memberFormLink" class="cta secondary" href="#" target="_blank" rel="noopener">Be added to the directory</a>
        </div>
      </div>
      <img class="site-logo" src="Logo.png" alt="Lebanese Physics Society logo" />
    </div>
  </header>

  <main class="container">
    <section class="controls" aria-label="Search and filters">
      <input id="searchInput" type="search" placeholder="Search by name, institution, keyword..." />
      <select id="fieldFilter">
        <option value="">All branches</option>
      </select>
    </section>

    <p id="count" class="count"></p>
    <section id="membersGrid" class="members-grid"></section>
    <p id="errorBox" class="error" hidden></p>
  </main>

  <footer class="container footer">
    <p>Per Leges Naturae ad Deum Cedrorum</p>
    <p class="footer-links">
      <a id="footerWhatsappLink" href="#" target="_blank" rel="noopener">WhatsApp group</a>
      <span>·</span>
      <a id="footerMemberFormLink" href="#" target="_blank" rel="noopener">Member directory form</a>
      <span>·</span>
      <a href="news.html">News</a>
      <span>·</span>
      <a href="offers.html">Offers</a>
    </p>
  </footer>

  <script src="config.js"></script>
  <script src="csv.js"></script>
  <script src="app.js"></script>
</body>
</html>
